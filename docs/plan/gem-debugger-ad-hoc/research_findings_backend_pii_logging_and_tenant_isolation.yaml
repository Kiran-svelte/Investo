  sources:
    gem_debugger_resource: "C:/Users/kiran/AppData/Roaming/Code - Insiders/User/workspaceStorage/b4bf5f007cf49cac903b3f45cbc487bb/GitHub.copilot-chat/chat-session-resources/7dbbcf1a-e0e3-45a4-8d9d-0a5383151a6f/call_WJTqDjARLG85ECoOJHdM34Pj__vscode-1775916460963/content.json"
    repo_precedent_masking: "backend/src/routes/greenapi-webhook.routes.ts:152-179"

  pii_masking:
    masking_format:
      description: |
        Use the existing GreenAPI masking shape as the canonical phone masking format:
        - Normalize to digits, then render as `+{prefix}{stars}{last4}`.
        - KeepPrefixLen = up to 2 digits (country code hint), keepLast = 4 digits, mask the rest with `*`.
        - Examples: `919999999999` → `+91******9999`; `+14155552671` → `+14*****2671`.
        Source: `maskPhoneNumberForLogs` implementation (backend/src/routes/greenapi-webhook.routes.ts:152-170).
      exact_function_currently_in_repo:
        name: maskPhoneNumberForLogs
        location: backend/src/routes/greenapi-webhook.routes.ts:152-170

    log_lines_to_change:
      - location: backend/src/routes/webhook.routes.ts:170-175
        current_log: "logger.info('=== PROCESS WEBHOOK START ===', { ..., fullBody: JSON.stringify(body).substring(0, 500) })"
        issue: "`fullBody` contains raw webhook payload fragments including `messages[].from`." 
        change: "Remove `fullBody` from logs or replace with non-PII correlation fields (counts + payload hash)."
        source: "gem-debugger content.json extra.root_cause.causal_chain[0] + repo code"

      - location: backend/src/routes/webhook.routes.ts:232-239
        current_log: "logger.info('=== PROCESSING MESSAGE ===', { ..., from: message.from, ... })"
        issue: "Logs raw sender phone number (`message.from`)."
        change: "Log masked phone using the masking format above (or omit the field entirely)."
        source: "gem-debugger content.json extra.root_cause.causal_chain[1] + repo code"

      - location: backend/src/routes/webhook.routes.ts:226
        current_data: "outcome.from: message?.from || null"
        issue: "The summary object later logs `outcomes[].from` via the unredacted summary log." 
        change: "Either (a) store masked `outcome.from`, OR (b) keep raw in-memory but redact when logging the summary (preferred, matching GreenAPI pattern)."
        source: "gem-debugger content.json extra.root_cause.causal_chain[2] + repo code"

      - location: backend/src/routes/webhook.routes.ts:78
        current_log: "logger.info('Webhook processing summary', { summary })"
        issue: "Logs the entire summary object including `outcomes[].from` (raw)."
        change: "Log a redacted summary object (e.g., `summary: redactMetaSummaryForLogs(summary)`), analogous to GreenAPI redaction." 
        source: "gem-debugger content.json extra.root_cause.causal_chain[2] + repo code; precedent: backend/src/routes/greenapi-webhook.routes.ts:82,174-179"

      - location: backend/src/routes/webhook.routes.ts:284-292
        current_log: "logger.info('=== CALLING handleIncomingMessage ===', { customerPhone: customerPhone.substring(0, 6) + '****', ... })"
        issue: "Ad-hoc masking is inconsistent with other routes and does not preserve last-4 correlation." 
        change: "Replace ad-hoc substring masking with the canonical masking format used for all phone logs."
        source: "repo code (backend/src/routes/webhook.routes.ts:284-292) + masking precedent (backend/src/routes/greenapi-webhook.routes.ts:152-170)"

      - location: backend/src/services/whatsapp.service.ts:223-226
        current_log: "logger.info('=== WHATSAPP SERVICE: handleIncomingMessage START ===', { phoneNumberId: msg.phoneNumberId, customerPhone: msg.customerPhone })"
        issue: "Logs raw `msg.customerPhone` (E.164 with `+`)."
        change: "Log masked phone using the canonical masking format (or omit the field)."
        source: "gem-debugger content.json extra.root_cause.causal_chain[3] + repo code"

  meta_mode_company_resolution:
    current_fallbacks_to_remove_or_adjust:
      - location: backend/src/services/whatsapp.service.ts:163-181
        current_behavior: "If exactly one active company has WhatsApp configured, route to it (even if `phoneNumberId` does not match)."
        risk: "Implicit cross-tenant fallback when inbound `phone_number_id` is missing/unmapped."
        source: "repo code + gem-debugger content.json extra.root_cause.causal_chain[4]"

      - location: backend/src/services/whatsapp.service.ts:186-203
        current_behavior: "If any active company exists and `config.whatsapp.accessToken` is set, route to `companies[0]` (unordered)."
        risk: "Nondeterministic and unsafe tenant routing; Prisma `findMany()` has no `orderBy` so `companies[0]` can vary."
        source: "repo code + gem-debugger content.json extra.root_cause.causal_chain[5]"

    new_decision_tree_prod_vs_non_prod: |
      Decision tree described in gem-debugger output (fail-closed in production) and aligned to current code structure:

      1) Normalize `phoneNumberId` (trim) and require non-empty.
         - Source: gem-debugger recommendation (content.json extra.fix_recommendations[1].approach).

      2) Deterministic mapping only:
         - Find active companies with `settings.whatsapp.phoneNumberId === normalizedPhoneNumberId` (and optionally legacy `whatsappPhone === normalizedPhoneNumberId`).
         - If exactly 1 match: return it.
         - If >1 matches: treat as configuration conflict; do NOT pick first.
         - Source: gem-debugger recommendation (content.json extra.fix_recommendations[1].approach) + current mapping loop (backend/src/services/whatsapp.service.ts:132-145).

      3) No implicit fallback in production:
         - If no match and `config.env === 'production'`: fail closed (return null or throw typed error) and do not route.
         - Source: gem-debugger recommendation (content.json extra.fix_recommendations[1].approach) + env definition (backend/src/config/index.ts:238-246).

      4) Limited non-prod fallback (deterministic):
         - If `config.env !== 'production'` and there is exactly 1 active company total: allow fallback to that company (optionally only if it has WhatsApp configured).
         - Else: fail closed.
         - Source: gem-debugger recommendation (content.json extra.fix_recommendations[1].approach).

      5) Remove `companies[0]` fallback entirely.
         - Source: gem-debugger recommendation (content.json extra.fix_recommendations[1].approach) + current unsafe block (backend/src/services/whatsapp.service.ts:186-203).

