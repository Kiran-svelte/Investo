patterns_found:
  - category: structure
    pattern: "Structured logs emit full meta objects without PII redaction"
    description: "Logger calls pass rich objects (payload fragments, sender IDs, summaries). Without a shared redaction layer, PII leaks occur when raw phones are stored in objects that are later logged wholesale."
    examples:
      - file: backend/src/routes/webhook.routes.ts
        location: "170-175"
        snippet: "fullBody: JSON.stringify(body).substring(0, 500)"
      - file: backend/src/routes/webhook.routes.ts
        location: "78"
        snippet: "logger.info('Webhook processing summary', { summary });"
    prevalence: common

  - category: architecture
    pattern: "Summary redaction-at-log-time exists for GreenAPI but not Meta"
    description: "GreenAPI logs `summary: redactGreenApiSummaryForLogs(summary)` (masking outcomes.from). Meta route logs `summary` directly."
    examples:
      - file: backend/src/routes/greenapi-webhook.routes.ts
        location: "82,174-179"
        snippet: "logger.info('GreenAPI webhook processing summary', { summary: redactGreenApiSummaryForLogs(summary) });"
      - file: backend/src/routes/webhook.routes.ts
        location: "78"
        snippet: "logger.info('Webhook processing summary', { summary });"
    prevalence: occasional

  - category: architecture
    pattern: "Meta-mode tenant routing has implicit fallback paths"
    description: "After failing to match configured phoneNumberId, the service can route to a single WhatsApp-configured company or to the first active company when a global token is set."
    examples:
      - file: backend/src/services/whatsapp.service.ts
        location: "163-203"
        snippet: "if (companiesWithWhatsApp.length === 1) { ... } ... if (companies.length > 0 && config.whatsapp.accessToken) { const company = companies[0]; ... }"
    prevalence: occasional

  - category: testing
    pattern: "Route unit tests use `jest.doMock` + `jest.isolateModules` to inject config/logger/service mocks"
    description: "Webhook route tests set NODE_ENV, mock config/logger/services, and use supertest to exercise routes, then inspect `logger.*.mock.calls`."
    examples:
      - file: backend/src/tests/unit/webhook.routes.reliability.test.ts
        location: "55-120"
        snippet: "jest.doMock('../../config/logger', () => ({ default: logger }))"
