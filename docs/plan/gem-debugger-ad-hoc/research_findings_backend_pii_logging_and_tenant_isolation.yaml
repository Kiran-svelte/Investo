plan_id: gem-debugger-ad-hoc
objective: "Summarize concrete fix steps from gem-debugger output (call_WJTqDjARLG85ECoOJHdM34Pj) for PII-safe logging + Meta-mode tenant isolation; map to exact repo files/tests."
