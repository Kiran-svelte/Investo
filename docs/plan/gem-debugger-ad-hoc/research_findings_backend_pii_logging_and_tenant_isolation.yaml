        anchors: "Existing summary assertions at lines 230, 277, 421; fixture phone numbers at 152, 255, 301, 360."
        source: "gem-debugger content.json extra.fix_recommendations[2].approach + repo test file"

      - file: backend/src/tests/unit/whatsapp.inbound-processing.test.ts
        change: "Add a unit test that asserts the initial `logger.info` call for `handleIncomingMessage` logs a masked phone (not raw `+919999999999`)."
        anchors: "Logger mock defined at lines 56-66; inbound calls in tests begin at line 145."
        source: "gem-debugger content.json extra.fix_recommendations[2].approach + repo test file"

    add:
      - file: backend/src/tests/unit/whatsapp.meta-company-resolution.test.ts
        cases:
          - "Production (`config.env='production'`): multiple active companies, no phoneNumberId match → must fail closed (return null/throw)."
          - "Non-prod: exactly 1 active company, no match → allowed deterministic fallback."
          - "Non-prod: >1 active companies, no match → fail closed."
          - "Duplicate mappings (2 companies share the same phoneNumberId) → fail closed (configuration conflict)."
        source: "gem-debugger content.json extra.fix_recommendations[2].approach"

