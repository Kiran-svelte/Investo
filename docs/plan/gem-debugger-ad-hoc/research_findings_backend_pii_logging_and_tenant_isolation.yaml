tldr: |
  - Meta webhook logs include raw sender identifiers in multiple places: `fullBody` dump, per-message `from`, and the summary object that contains `outcomes[].from` (backend/src/routes/webhook.routes.ts:78,170-175,226,232-239).
  - WhatsAppService logs `customerPhone` raw at inbound start (backend/src/services/whatsapp.service.ts:223-226).
  - Meta-mode tenant selection is unsafe because `getCompanyByPhoneNumberId` can fall back to the first active company (`companies[0]`) when a global access token is configured; Prisma `findMany()` has no ordering, so this fallback is nondeterministic (backend/src/services/whatsapp.service.ts:91-203).
  - GreenAPI webhook already demonstrates a working precedent: redact summary objects at log time using a phone-masking helper (backend/src/routes/greenapi-webhook.routes.ts:82,152-179).
  - Existing unit tests already assert webhook summary outcomes; they can be extended to assert that raw phone digits never appear in logged metadata (backend/src/tests/unit/webhook.routes.reliability.test.ts:230,277,421).

