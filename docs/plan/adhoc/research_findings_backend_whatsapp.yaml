patterns_found:
  - category: architecture
    pattern: "Webhook mounted before global JSON parsing to preserve raw bytes"
    description: "Webhook router is mounted before the global `express.json` body parser so the webhook route can capture `rawBody` for signature verification."
    examples:
      - file: backend/src/app.ts
        location: backend/src/app.ts:49-60
        snippet: "app.use('/api/webhook', webhookRoutes);\n\n// Body parsing (for all non-webhook routes)\napp.use(express.json({ limit: '10mb' }));"
    prevalence: common

  - category: structure
    pattern: "Webhook POST uses request-body verify hook for signature validation"
    description: "Webhook POST handler uses `express.json({ verify })` to store `(req as any).rawBody` for HMAC verification."
    examples:
      - file: backend/src/routes/webhook.routes.ts
        location: backend/src/routes/webhook.routes.ts:41-54
        snippet: "express.json({\n  limit: '1mb',\n  verify: (req, _res, buf) => {\n    (req as any).rawBody = buf;\n  },\n}),"
    prevalence: common

  - category: architecture
    pattern: "Layered webhook hardening: IP whitelist + signature verification (prod strict, non-prod permissive)"
    description: "All webhook routes pass through IP whitelist middleware; signature verification rejects missing/invalid signature in production but allows missing secret/signature in non-production."
    examples:
      - file: backend/src/routes/webhook.routes.ts
        location: backend/src/routes/webhook.routes.ts:13,89-127
        snippet: "router.use(whatsappIpWhitelist);\n\nif (!config.whatsapp.appSecret) {\n  if (config.env === 'production') {\n    return { allowed: false, reason: 'app_secret_missing' };\n  }\n\n  logger.warn('WHATSAPP_APP_SECRET not configured - allowing webhook only in non-production');\n  return { allowed: true, reason: 'non_prod_missing_app_secret' };\n}"
