    prevalence: common

  - category: structure
    pattern: "Single service owns inbound processing + outbound messaging"
    description: "`WhatsAppService` contains multi-tenant lookup, lead/conversation/message persistence, AI response generation, and Meta Graph API sends in one class."
    examples:
      - file: backend/src/services/whatsapp.service.ts
        location: backend/src/services/whatsapp.service.ts:455-459
        snippet: "// Send via WhatsApp Cloud API using company-specific config\nawait this.sendMessage(msg.customerPhone, aiResponse.text, whatsappConfig!);"
    prevalence: common

  - category: architecture
    pattern: "Redis-backed webhook message deduplication with in-memory fallback"
    description: "Webhook ingestion relies on a deduplication service that claims message IDs atomically in Redis (SET NX + TTL) and falls back to an in-memory Map when Redis is unavailable."
    examples:
      - file: backend/src/services/deduplication.service.ts
        location: backend/src/services/deduplication.service.ts:52-86
        snippet: "async claimMessageProcessing(messageId: string, ttlSeconds = this.ttlSeconds): Promise<boolean> {\n  const redis = getRedis();\n  const key = `${DEDUP_KEY_PREFIX}${messageId}`;\n\n  if (redis) {\n    try {\n      const result = await redis.set(key, '1', {\n        nx: true,\n        ex: ttlSeconds,\n      });\n\n      const claimed = result === 'OK';\n\n      logger.debug('Deduplication claim (Redis)', {\n        messageId,\n        claimed,\n        ttlSeconds,\n      });\n\n      return claimed;\n    } catch (err: any) {\n      logger.warn('Redis deduplication claim failed, falling back to memory', {\n        messageId,\n        error: err.message,\n      });\n    }\n  }\n\n  return this.memoryClaimMessage(messageId, ttlSeconds);\n}"
    prevalence: common

  - category: structure
    pattern: "Health endpoint under webhook router returns WhatsApp/Redis/dedup metrics"
    description: "Webhook router includes `GET /health` which calls `whatsappHealthService.getHealthStatus()` and maps WhatsApp connectivity to 200 vs 503."
    examples:
      - file: backend/src/routes/webhook.routes.ts
        location: backend/src/routes/webhook.routes.ts:393-418
        snippet: "router.get('/health', async (req: Request, res: Response) => {\n  try {\n    const health = await whatsappHealthService.getHealthStatus();\n\n    // Return appropriate status code based on WhatsApp connection\n    const statusCode = health.whatsapp.connected ? 200 : 503;\n\n    res.status(statusCode).json(health);\n  } catch (err: any) {\n    logger.error('Health check failed', { error: err.message });\n    res.status(500).json({\n      error: 'Health check failed',\n      message: err.message,\n    });\n  }\n});"
    prevalence: occasional

  - category: testing
    pattern: "Jest isolates webhook router and mocks heavy dependencies"
    description: "Unit tests reset modules/env, mock logger + services (WhatsApp, deduplication, health), mount router in an Express app, and validate security behavior with Supertest."
    examples:
      - file: backend/src/tests/unit/webhook.routes.security.test.ts
        location: backend/src/tests/unit/webhook.routes.security.test.ts:25-103
        snippet: "jest.doMock('../../services/whatsapp.service', () => ({\n  __esModule: true,\n  whatsappService: {\n    handleIncomingMessage: jest.fn().mockResolvedValue({\n      status: 'skipped',\n      reason: 'test_stub',\n      propagation: { status: 'not_attempted' },\n    }),\n    getCompanyByPhoneNumberId: jest.fn().mockResolvedValue(null),\n  },\n}));\n\nlet router: any;\njest.isolateModules(() => {\n  router = require('../../routes/webhook.routes').default;\n});\n\nconst app = express();\napp.use('/api/webhook', router);"
    prevalence: common

  - category: testing
    pattern: "WhatsAppService unit tests mock global fetch for Meta API calls"
    description: "Service-level unit tests replace `global.fetch` to validate payload structure and success/failure handling for text, media, and interactive methods."
    examples:
      - file: backend/src/tests/unit/whatsapp-media.test.ts
        location: backend/src/tests/unit/whatsapp-media.test.ts:11-12
        snippet: "const mockFetch = jest.fn();\nglobal.fetch = mockFetch;"
      - file: backend/src/tests/unit/interactive-buttons.test.ts
        location: backend/src/tests/unit/interactive-buttons.test.ts:60-62
        snippet: "// Mock fetch for WhatsApp API calls\nconst mockFetch = jest.fn();\nglobal.fetch = mockFetch;"
    prevalence: common

