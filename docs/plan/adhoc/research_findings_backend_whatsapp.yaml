plan_id: adhoc
objective: Map current backend WhatsApp integration (Meta webhook + outbound sends), locate provider-selection hooks, and capture divergence from archived Green-API dual-provider proposal.
focus_area: backend WhatsApp integration (Meta webhook + outbound send paths)
created_at: "2026-04-12"
created_by: GitHub Copilot (GPT-5.2)
status: completed

tldr: |
  - Meta webhook is mounted at `/api/webhook` before global JSON parsing to preserve raw request bytes for signature verification (backend/src/app.ts:49-58).
  - Webhook POST uses an `express.json` verify hook to stash `rawBody`, then `verifyWebhookSignature` enforces `WHATSAPP_APP_SECRET` + `x-hub-signature-256` in production; non-production allows missing secret/signature (backend/src/routes/webhook.routes.ts:41-84,89-138; backend/src/config/index.ts:283-294).
  - IP whitelist middleware `whatsappIpWhitelist` is applied to all webhook routes; enablement is controlled by `WHATSAPP_IP_WHITELIST_ENABLED` and `SKIP_IP_WHITELIST` and allows local/private IPs in non-production (backend/src/routes/webhook.routes.ts:13; backend/src/middleware/whatsappSecurity.ts:112-205; backend/src/config/index.ts:290-294).
  - Webhook router also exposes `GET /api/webhook/health`, returning WhatsApp API connectivity + Redis/deduplication metrics via `whatsappHealthService.getHealthStatus` (backend/src/routes/webhook.routes.ts:393-418; backend/src/services/whatsappHealth.service.ts:133-148,251-269).
  - Outbound sends from conversation center, automation, and notifications call `whatsappService.sendMessage` (Meta Graph API); conversation center also uses Meta-only rich send methods (`sendDocument`, `sendInteractiveButtons`) (backend/src/routes/conversation.routes.ts:326-405; backend/src/services/automation.service.ts:223,357; backend/src/services/notification.engine.ts:247,316; backend/src/services/whatsapp.service.ts:552-633).
  - A Green-API provider plan exists only as diff artifacts under `test-results/` (env `WHATSAPP_PROVIDER`, `GREENAPI_*`, route `/api/greenapi/webhook`, and `type WhatsAppProvider`) and is absent from current backend source (test-results/diff_backend__src__config__index.ts.txt:10-24; test-results/diff_backend__src__app.ts.txt:9-18; test-results/diff_backend__src__services__whatsapp.service.ts.txt:9-39; research: grep_search `WHATSAPP_PROVIDER|GREENAPI_` in `backend/src/**` returned no matches on 2026-04-12).

research_metadata:
  methodology: "Hybrid retrieval: grep_search for key symbols/paths + targeted read_file for verification; relationship discovery by tracing call sites into services; physical line counts via ReadAllText split on \\n for file inventory. Included includeIgnoredFiles=true to inspect test-results diff artifacts."
  scope: "Focused on backend Meta webhook ingestion, webhook security middleware, deduplication + health endpoints under the webhook router, WhatsApp service inbound/outbound logic (including socket propagation), outbound call sites (conversation/automation/notifications), setup docs, unit tests around webhook security/reliability and WhatsApp rich messaging, and archived diff artifacts proposing Green-API provider selection."
  confidence: high
  coverage: 85
  decision_blockers: 2
  research_blockers: 1

