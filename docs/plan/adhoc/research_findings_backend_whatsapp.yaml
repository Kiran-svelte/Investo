domain_security_considerations:
  sensitive_areas:
    - area: "Debug webhook endpoint without signature verification"
      location: backend/src/routes/webhook.routes.ts:488-584
      concern: "`POST /api/webhook/debug` processes webhook bodies and calls WhatsAppService without running `verifyWebhookSignature`; access control depends on IP whitelist middleware which may be disabled via config (backend/src/routes/webhook.routes.ts:13; backend/src/middleware/whatsappSecurity.ts:112-137; backend/src/config/index.ts:290-294)."
    - area: "Webhook health endpoint status exposure"
      location: backend/src/routes/webhook.routes.ts:393-418
      concern: "`GET /api/webhook/health` returns WhatsApp connectivity, Redis availability, and deduplication stats; it is inside the webhook router and therefore subject to IP whitelist enablement/bypass (backend/src/routes/webhook.routes.ts:13,393-418; backend/src/middleware/whatsappSecurity.ts:112-137)."
    - area: "Non-production signature verification bypass"
      location: backend/src/routes/webhook.routes.ts:96-127
      concern: "When `WHATSAPP_APP_SECRET` is missing or signature header absent, webhook POST is allowed in non-production with warning logs; production rejects (backend/src/routes/webhook.routes.ts:96-123)."
    - area: "SKIP_IP_WHITELIST bypass"
      location: backend/src/middleware/whatsappSecurity.ts:124-131
      concern: "When `SKIP_IP_WHITELIST=true`, IP whitelist is bypassed regardless of environment."
  authentication_patterns_in_domain: "Webhook verification and ingestion use token verification (GET) and signature verification (POST) rather than JWT auth (backend/src/routes/webhook.routes.ts:20-38,58-74)."
  authorization_patterns_in_domain: "Agent/admin routes use `authorize` middleware; webhook routes are explicitly unauthenticated (backend/src/routes/ai-settings.routes.ts:100-132; backend/src/routes/webhook.routes.ts:17-28)."
  data_validation_in_domain: "Webhook POST validates via signature checks; application routes use Zod schemas and runtime checks (backend/src/routes/webhook.routes.ts:58-74; backend/src/routes/conversation.routes.ts:344-360)."

