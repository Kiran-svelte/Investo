open_questions:
  - question: "If adding dual-provider support, is provider selection intended to be global via env, per-company via `company.settings.whatsapp`, or both?"
    context: "Current config has `config.ai.provider` but WhatsApp config is Meta-only and company-specific credentials are read from settings; diff artifacts propose `WHATSAPP_PROVIDER` env selection."
    type: decision_blocker
    affects: ["whatsapp-dual-provider"]

  - question: "What is the expected Green-API inbound webhook payload shape and how should it map to `IncomingMessage` fields (phoneNumberId/customerPhone/messageId/interactiveId)?"
    context: "Current inbound pipeline expects Meta-shaped events parsed by `processWebhook` and feeds `IncomingMessage` (backend/src/services/whatsapp.service.ts:9-16); archived diffs reference a Green-API webhook route but no implementation exists in source."
    type: research
    affects: ["whatsapp-dual-provider"]

  - question: "Are production deployments guaranteed to set `WHATSAPP_IP_WHITELIST_ENABLED=true` and `WHATSAPP_APP_SECRET` to avoid permissive defaults and keep non-webhook endpoints shielded by the whitelist middleware?"
    context: "IP whitelist enablement is driven by env vars (backend/src/config/index.ts:290-294; backend/src/middleware/whatsappSecurity.ts:112-137), and webhook signature verification is strict only when secrets/signatures are present in production (backend/src/routes/webhook.routes.ts:96-123)."
    type: nice_to_know
    affects: ["whatsapp-webhook-hardening"]

gaps:
