    path: frontend/src/pages/ai-settings/AISettingsPage.tsx
    purpose: Renders /ai-settings, loads and saves WhatsApp Business Integration fields via company settings, computes the displayed webhook URL, and triggers connection tests.
    key_elements:
      - element: webhookUrl computation
        type: pattern
        location: frontend/src/pages/ai-settings/AISettingsPage.tsx:115
        description: Builds read-only webhook URL as `${backendBase}/api/webhook` using `api.defaults.baseURL` (minus `/api`) or `window.location.origin`.
      - element: handleSaveWhatsApp
        type: function
        location: frontend/src/pages/ai-settings/AISettingsPage.tsx:200
        description: Reads current company settings then PUTs merged `settings.whatsapp` (phoneNumberId/accessToken/verifyToken/webhookUrl) to `/companies/:companyId`.
      - element: handleTestWhatsApp
