related_conventions:
  naming_patterns_in_domain: |
    - Company settings key: company.settings.whatsapp.{phoneNumberId, accessToken, verifyToken, webhookUrl} (camelCase).
    - Request bodies often use snake_case in API routes (e.g., phone_number_id/access_token in /ai-settings/whatsapp/test).
    - Legacy support exists for company.settings.whatsapp.phone_number_id in Meta company resolution.

  structure_of_domain: |
    Frontend: React page reads/writes settings via REST.
    Backend: Express routers for /ai-settings, /companies, /webhook, /greenapi/webhook; WhatsAppService owns provider selection + tenant routing.

  error_handling_in_domain: |
    - Webhook endpoints reject with 401/403/422/404 depending on auth/signature/mapping failures.
    - Production webhook signature enforcement is strict; non-production allows missing app secret/signature.

  testing_in_domain: |
    Jest unit tests isolate modules and mock config/services to test provider-aware branching and security behavior.

  documentation_in_domain: |
    WEBHOOK_CONFIGURATION.md documents provider policy, env vars, webhook endpoints, and GreenAPI mapping.
    docs/PRD.yaml defines acceptance criteria for provider gating and route mounting.

