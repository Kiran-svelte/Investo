patterns_found:
  - category: architecture
    pattern: "Dual-provider outbound abstraction with production Meta-only enforcement"
    description: "Provider selection is driven by config.whatsapp.provider, but forced to meta in production; provider instantiation is centralized in WhatsAppService. Production misconfiguration fails fast during config load."
    examples:
      - file: backend/src/config/index.ts
        location: backend/src/config/index.ts:241
        snippet: "if (nodeEnv === 'production' && whatsappProvider !== 'meta') { throw new Error(...) }"
      - file: backend/src/services/whatsapp.service.ts
        location: backend/src/services/whatsapp.service.ts:56
        snippet: "if (config.env === 'production') { return 'meta'; }"
    prevalence: common

  - category: structure
    pattern: "Per-company WhatsApp config stored in company.settings JSON blob"
    description: "The AI Settings page persists WhatsApp configuration under company.settings.whatsapp via the companies update endpoint; backend accepts settings as an opaque blob." 
    examples:
      - file: frontend/src/pages/ai-settings/AISettingsPage.tsx
        location: frontend/src/pages/ai-settings/AISettingsPage.tsx:200
        snippet: "await api.put(`/companies/${user.company_id}`, { settings: newSettings });"
      - file: backend/src/routes/company.routes.ts
        location: backend/src/routes/company.routes.ts:225
        snippet: "...(settings && { settings }),"
    prevalence: common

  - category: error_handling
    pattern: "Fail-closed tenant routing on inbound webhooks"
    description: "Inbound processing requires deterministic mapping to a single active company. GreenAPI rejects missing/multiple instance identifiers (422) and unmapped identifiers (404) before acknowledging; Meta routing fails closed in production when unmapped/duplicate." 
    examples:
      - file: backend/src/routes/greenapi-webhook.routes.ts
        location: backend/src/routes/greenapi-webhook.routes.ts:61
        snippet: "res.status(422).json({ error: 'missing_instance_identifier' ... });"
      - file: backend/src/services/whatsapp.service.ts
        location: backend/src/services/whatsapp.service.ts:190
        snippet: "if (config.env === 'production') { ... return null; }"
    prevalence: common

  - category: security
    pattern: "Webhook verification via verify token and HMAC signature"
    description: "Meta webhook verification checks hub.verify_token against backend config and uses x-hub-signature-256 HMAC with WHATSAPP_APP_SECRET; signature/app secret are enforced in production." 
    examples:
      - file: backend/src/routes/webhook.routes.ts
        location: backend/src/routes/webhook.routes.ts:26
        snippet: "if (mode === 'subscribe' && token === config.whatsapp.verifyToken) { ... }"
      - file: backend/src/routes/webhook.routes.ts
        location: backend/src/routes/webhook.routes.ts:90
        snippet: "function verifyWebhookSignature(body, signature) { ... createHmac('sha256', config.whatsapp.appSecret) ... }"
    prevalence: common

  - category: testing
    pattern: "Jest module isolation with config/service mocks"
    description: "Route unit tests isolate module imports and mock config + services to exercise provider-aware branching and security logic." 
    examples:
      - file: backend/src/tests/unit/ai-settings.routes.whatsapp-test.test.ts
        location: backend/src/tests/unit/ai-settings.routes.whatsapp-test.test.ts:12
        snippet: "jest.doMock('../../config', () => ({ default: params.config }))"
      - file: backend/src/tests/unit/webhook.routes.security.test.ts
        location: backend/src/tests/unit/webhook.routes.security.test.ts:243
        snippet: "test('POST rejects when WHATSAPP_APP_SECRET is missing in production', ... )"
    prevalence: common

