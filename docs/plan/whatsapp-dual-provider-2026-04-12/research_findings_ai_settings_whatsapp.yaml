  framework: Jest + Supertest
  coverage_areas:
    - "Provider-aware /api/ai-settings/whatsapp/test branching"
    - "Meta webhook signature enforcement in production"
    - "GreenAPI webhook Authorization handling"
    - "GreenAPI instance→company mapping (fail-closed)"
  test_organization: "backend/src/tests/unit/*"
  mock_patterns:
    - "jest.doMock('../../config', ...) and jest.isolateModules() for route tests"

open_questions:
  - question: "Should the per-company WhatsApp 'verifyToken' UI field be treated as informational-only, given GET /api/webhook uses global WHATSAPP_VERIFY_TOKEN?"
    context: "AISettingsPage persists company.settings.whatsapp.verifyToken, but webhook verification reads config.whatsapp.verifyToken from env (backend/src/routes/webhook.routes.ts)."
    type: nice_to_know
    affects: ["wa07_docs_update"]

  - question: "In GreenAPI mode, should the UI display /api/greenapi/webhook somewhere, since the read-only webhook URL is always /api/webhook?"
    context: "GreenAPI inbound route is /api/greenapi/webhook and is conditionally mounted, but AISettingsPage computes webhookUrl as `${backendBase}/api/webhook`."
    type: nice_to_know
    affects: ["wa07_docs_update"]

gaps:
  - area: "UI guidance for Meta vs GreenAPI"
    description: "The /ai-settings UI stores Meta-labeled fields in settings.whatsapp, but the backend uses a separate /api/greenapi/webhook endpoint in GreenAPI mode and does not consume settings.whatsapp.webhookUrl; the UI does not reflect provider-specific webhook endpoint selection."
    impact: nice_to_know
    affects: ["wa07_docs_update"]

  - area: "Internal runbook for Meta console navigation"
    description: "Repository docs describe required values (verify token/app secret/phone number ID/access token) but do not include step-by-step Meta App Dashboard navigation for obtaining them; external Meta docs were referenced."
    impact: nice_to_know
    affects: ["wa07_docs_update"]
