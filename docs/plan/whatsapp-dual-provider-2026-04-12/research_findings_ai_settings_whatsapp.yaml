plan_id: whatsapp-dual-provider-2026-04-12
objective: |
  Map the /ai-settings "WhatsApp Business Integration" fields to the exact frontend+backend code paths,
  including save/test endpoints, webhook URL derivation, and dual-provider (Meta vs GreenAPI) behavior.
focus_area: ai_settings_whatsapp
created_at: "2026-04-12"
created_by: GitHub Copilot (GPT-5.2)
status: completed

tldr: |
  - /ai-settings WhatsApp fields are persisted per-company under company.settings.whatsapp via PUT /api/companies/:id (frontend AISettingsPage → backend company.routes).
  - The UI “Webhook URL” is computed (read-only) as <backendBase>/api/webhook using the frontend API base URL logic; it does not reflect GreenAPI’s /api/greenapi/webhook route.
  - Meta webhook verification compares hub.verify_token to the backend global config.whatsapp.verifyToken (WHATSAPP_VERIFY_TOKEN), not the per-company saved verifyToken field.
  - Production enforces Meta-only provider (WHATSAPP_PROVIDER must be meta); GreenAPI inbound webhook is mounted only when NODE_ENV!=production and WHATSAPP_PROVIDER=greenapi.
  - GreenAPI inbound routing is fail-closed and deterministic: instance identifier extracted from payload must match company.settings.whatsapp.phoneNumberId (unique per active company).

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search for endpoint/field discovery, targeted read_file for implementation details, relationship discovery by tracing UI → API calls → routes → services → config; external doc verification via fetch_webpage (Meta docs)."
  scope: "Focused on /ai-settings WhatsApp section (frontend), company settings persistence, WhatsApp test endpoint, webhook endpoints (/api/webhook and /api/greenapi/webhook), provider gating (meta vs greenapi), and related tests/docs."
  confidence: high
  coverage: 0.85
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
