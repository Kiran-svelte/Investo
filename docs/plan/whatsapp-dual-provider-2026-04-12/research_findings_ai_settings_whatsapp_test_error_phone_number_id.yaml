plan_id: whatsapp-dual-provider-2026-04-12
objective: |
  Identify the backend origin and triggering conditions for the AI Settings WhatsApp error banner
  "phone_number_id and access_token are required" observed while Green-API is selected,
  and map the minimal change surface + unit tests for provider-aware validation.
focus_area: ai_settings_whatsapp_test_error_phone_number_id
created_at: "2026-04-13"
created_by: GitHub Copilot (GPT-5.2)
status: completed

tldr: |
  - Error string source: backend/src/routes/ai-settings.routes.ts:154 (POST /api/ai-settings/whatsapp/test meta-branch validation).
  - Provider routing is strict: provider='greenapi' only when req.body.provider === 'greenapi'; otherwise defaults to meta (backend/src/routes/ai-settings.routes.ts:105).
  - The meta branch returns the error when phone_number_id or access_token are missing from the request body (backend/src/routes/ai-settings.routes.ts:151-155).
  - Frontend currently sends provider-specific payloads (including provider: 'greenapi') from the AI settings page (frontend/src/pages/ai-settings/AISettingsPage.tsx:303-331).
  - Unit tests already cover provider-aware behavior for this endpoint (backend/src/tests/unit/ai-settings.routes.whatsapp-test.test.ts:93-178).

