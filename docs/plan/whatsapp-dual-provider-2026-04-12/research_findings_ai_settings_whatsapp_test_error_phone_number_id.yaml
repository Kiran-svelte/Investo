requested_summary:
  root_cause_explanation:
    - statement: "The only backend origin of 'phone_number_id and access_token are required' is the meta branch of POST /api/ai-settings/whatsapp/test, which triggers when the route does not resolve provider as 'greenapi' and the request body lacks phone_number_id/access_token."
      sources:
        - backend/src/routes/ai-settings.routes.ts:105
        - backend/src/routes/ai-settings.routes.ts:151-155

  minimal_patch_plan:
    - file: backend/src/routes/ai-settings.routes.ts
      change_surface: |
        Provider resolution is currently strict (body.provider === 'greenapi'). If runtime requests can omit/misspell provider,
        the handler will fall back to meta and emit the meta-required error even for GreenAPI credential payloads.
        (This is the precise condition under which the banner appears.)
      sources:
        - backend/src/routes/ai-settings.routes.ts:105
        - backend/src/routes/ai-settings.routes.ts:154
    - file: frontend/src/pages/ai-settings/AISettingsPage.tsx
      change_surface: |
        The current code sends provider:'greenapi' for GreenAPI tests; if the banner persists while Green-API is selected,
        confirm the deployed build and network request payload match this implementation.
      sources:
        - frontend/src/pages/ai-settings/AISettingsPage.tsx:320-331

  existing_unit_tests:
    - test_file: backend/src/tests/unit/ai-settings.routes.whatsapp-test.test.ts
      coverage: "Covers meta happy path, greenapi happy path, and greenapi missing credentials 400."
      sources:
        - backend/src/tests/unit/ai-settings.routes.whatsapp-test.test.ts:93-178

  verification_commands:
    - "Set-Location backend"
    - "npm run test:unit -- ai-settings.routes.whatsapp-test.test.ts"

