required_changes_summary:
  frontend:
    provider_selector_and_fields:
      file: frontend/src/pages/ai-settings/AISettingsPage.tsx
      summary:
        - Adds whatsappConfig.provider ('meta'|'greenapi') and GreenAPI fields (idInstance, apiTokenInstance, webhookUrlToken).
        - Loads company.settings.whatsapp with support for nested whatsapp.meta and whatsapp.greenapi plus legacy flat keys.
        - Saves settings as { whatsapp: { provider, meta: {...}, greenapi: {...}, legacy mirrors... } }.
        - Tests connection via POST /api/ai-settings/whatsapp/test with provider-aware payload.
  backend:
    provider_aware_test_route:
      file: backend/src/routes/ai-settings.routes.ts
      summary:
        - Accepts req.body.provider to select meta vs greenapi test.
        - Enforces production gating for greenapi via config.whatsapp.allowGreenapiInProd.
        - For greenapi test, accepts id_instance + api_token_instance in request and passes them to WhatsAppService.testConnection.
    whatsapp_service_provider_selection:
      file: backend/src/services/whatsapp.service.ts
      summary:
        - resolveOutboundProviderName now accepts optional per-company config and uses whatsappConfig.provider when present.
        - Production gating: if provider=greenapi and NODE_ENV=production and allowGreenapiInProd is false, provider resolves to meta.
        - Caches outbound providers by provider name (meta vs greenapi) rather than a single instance.
        - sendMessage/testConnection pass provider + required credentials to the appropriate provider implementation.
        - getCompanyByPhoneNumberId now accepts an optional providerHint and reads nested company settings (whatsapp.meta / whatsapp.greenapi) with legacy fallbacks.
    provider_layer_changes:
      files:
        - backend/src/services/whatsapp/providers/whatsapp-provider.ts
        - backend/src/services/whatsapp/providers/meta-whatsapp.provider.ts
        - backend/src/services/whatsapp/providers/greenapi-whatsapp.provider.ts
      summary:
        - WhatsAppProviderConfig expands to include optional meta credentials and greenapi credentials (idInstance, apiTokenInstance) and optional provider discriminator.
        - GreenApiWhatsAppProvider no longer stores credentials in constructor; it requires them per call via companyConfig.
        - MetaWhatsAppProvider validates phoneNumberId/accessToken presence and returns 400-style failure when missing.
    outbound_call_site_wiring:
      files:
        - backend/src/routes/conversation.routes.ts
        - backend/src/services/automation.service.ts
        - backend/src/services/notification.engine.ts
      summary:
        - Normalizes company.settings.whatsapp with provider-aware shape (nested meta/greenapi) and passes provider + credentials through to whatsappService.sendMessage.

missing_pieces_or_mismatches_in_current_HEAD:
  - area: Production GreenAPI outbound gating consistency
    observation: >
      Current HEAD config fails fast when WHATSAPP_PROVIDER=greenapi in production unless WHATSAPP_ALLOW_GREENAPI_IN_PRODUCTION=true
      (backend/src/config/index.ts), but WhatsAppService.resolveOutboundProviderName still forces meta in production unconditionally
      (backend/src/services/whatsapp.service.ts). Stash changes align WhatsAppService with the allow flag.
    sources:
      - backend/src/config/index.ts
      - backend/src/services/whatsapp.service.ts
  - area: GreenAPI inbound provider hint
    observation: >
      With stash changes, WhatsAppService.handleIncomingMessage defaults inboundProvider to meta unless msg.provider==='greenapi'.
      Current GreenAPI webhook route calls whatsappService.handleIncomingMessage without provider, so GreenAPI inbound requests
      will be processed with inboundProvider=meta and will not invoke GreenAPI-specific deterministic routing logic unless the
      route passes provider='greenapi'.
    sources:
      - backend/src/routes/greenapi-webhook.routes.ts
      - backend/src/services/whatsapp.service.ts
  - area: Route mounting vs docs
    observation: >
      WEBHOOK_CONFIGURATION.md states /api/greenapi/webhook is mounted only in non-production when WHATSAPP_PROVIDER=greenapi,
      but backend/src/app.ts mounts /api/greenapi/webhook unconditionally and relies on internal guards.
    sources:
      - WEBHOOK_CONFIGURATION.md
      - backend/src/app.ts

