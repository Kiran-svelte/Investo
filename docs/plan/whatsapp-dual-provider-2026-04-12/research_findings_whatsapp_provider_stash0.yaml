plan_id: whatsapp-dual-provider-2026-04-12
objective: >
  Inspect git stash@{0} contents and classify changes needed for production-ready dual WhatsApp providers
  (Meta + GreenAPI) with provider selector UX and correct backend wiring, including production gating via
  WHATSAPP_ALLOW_GREENAPI_IN_PRODUCTION.
focus_area: stash@{0} (backend/src + frontend/src ai-settings + whatsapp providers)
created_at: "2026-04-13"
created_by: GitHub Copilot (GPT-5.2)
status: completed

tldr: |
  - Stash@{0} changes 13 files: 11 WhatsApp/provider-related, plus 2 unrelated DB/upload changes.
  - Frontend AI Settings adds a provider selector (meta vs greenapi), provider-specific fields, and writes company settings as nested whatsapp.meta + whatsapp.greenapi with legacy top-level mirrors.
  - Backend updates AI settings test route + WhatsApp provider layer + WhatsAppService to be provider-aware per-company, including allowGreenapiInProd gating in production.
  - Backend also updates conversation/automation/notification outbound send paths to read the new settings shape and pass provider + credentials into WhatsAppService.
  - Gap: GreenAPI webhook route still calls WhatsAppService.handleIncomingMessage without provider='greenapi'; with stash changes, inboundProvider defaults to 'meta', so GreenAPI-specific deterministic routing is not guaranteed unless the route passes the provider hint.

