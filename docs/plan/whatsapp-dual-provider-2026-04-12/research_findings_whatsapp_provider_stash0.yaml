related_architecture:
  components_relevant_to_domain:
    - component: WhatsAppService
      responsibility: Inbound processing and outbound sending; resolves company config; routes by provider.
      location: backend/src/services/whatsapp.service.ts
      relationship_to_domain: domain core
    - component: MetaWhatsAppProvider
      responsibility: Outbound text via Meta Graph API.
      location: backend/src/services/whatsapp/providers/meta-whatsapp.provider.ts
      relationship_to_domain: domain dependency
    - component: GreenApiWhatsAppProvider
      responsibility: Outbound text via Green-API.
      location: backend/src/services/whatsapp/providers/greenapi-whatsapp.provider.ts
      relationship_to_domain: domain dependency
    - component: GreenAPI webhook router
      responsibility: Authorizes + deduplicates GreenAPI inbound and forwards to WhatsAppService.
      location: backend/src/routes/greenapi-webhook.routes.ts
      relationship_to_domain: this uses domain outputs
    - component: AI settings WhatsApp test route
      responsibility: Connectivity test endpoint used by frontend UX.
      location: backend/src/routes/ai-settings.routes.ts
      relationship_to_domain: this uses domain outputs
    - component: AISettingsPage (frontend)
      responsibility: Provider selector UI; writes company.settings.whatsapp provider config.
      location: frontend/src/pages/ai-settings/AISettingsPage.tsx
      relationship_to_domain: this uses domain outputs

  interfaces_used_by_domain:
    - interface: WhatsAppOutboundProvider
      location: backend/src/services/whatsapp/providers/whatsapp-provider.ts
      usage_pattern: WhatsAppService delegates sendTextMessage/testConnection to provider implementation.

  data_flow_involving_domain: >
    Frontend updates company.settings.whatsapp via /api/companies/:id (PUT). Backend reads company.settings.whatsapp in
    conversation routes/automation/notification flows to build provider config and calls WhatsAppService.sendMessage.
    Inbound webhooks (Meta: /api/webhook, GreenAPI: /api/greenapi/webhook) resolve tenant mapping via WhatsAppService and
    then propagate messages into conversation/lead state.

  key_relationships_to_domain:
    - from: frontend/src/pages/ai-settings/AISettingsPage.tsx
      to: backend/src/routes/ai-settings.routes.ts
      relationship: calls
    - from: backend/src/routes/conversation.routes.ts
      to: backend/src/services/whatsapp.service.ts
      relationship: calls
    - from: backend/src/routes/greenapi-webhook.routes.ts
      to: backend/src/services/whatsapp.service.ts
      relationship: calls

