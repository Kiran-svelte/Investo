pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Accidentally breaks Meta webhook signature verification by changing mount order or parsing behavior"
      likelihood: medium
      impact: critical
      mitigation: |
        Keep `/api/webhook` mounted before global JSON parsing as-is (backend/src/app.ts).
        Add/keep regression tests that validate raw-body signature verification (backend/src/tests/unit/webhook.routes.security.test.ts).
        Mount any new Green-API route without modifying the existing `/api/webhook` router.

    - scenario: "Production starts with Green-API provider enabled (misconfiguration slips through)"
      likelihood: low
      impact: critical
      mitigation: |
        Validate `WHATSAPP_PROVIDER` inside the config module so any import of `config` fails fast.
        Add config unit tests asserting `NODE_ENV=production` + `WHATSAPP_PROVIDER=greenapi` throws.

    - scenario: "Green-API webhook auth token mismatch causes silent 403s and missed inbound leads"
      likelihood: medium
      impact: high
      mitigation: |
        Compare the full `Authorization` header to an expected value derived from `GREENAPI_WEBHOOK_URL_TOKEN`.
        Document exact token/header rules (Basic vs Bearer vs default) and add tests for common variants.
        Log rejection reasons without leaking tokens.

  assumptions:
    - "`NODE_ENV=production` is the sole signal for 'production' gating (backend/src/config/index.ts uses `process.env.NODE_ENV`)."
    - "Green-API will be used only in non-production; production will continue to use Meta WhatsApp Cloud API."
    - "A separate webhook endpoint is acceptable for Green-API so Meta `/api/webhook` route stays untouched."

implementation_specification:
  code_structure: |
    - Keep the existing Meta webhook router and its security invariants unchanged (backend/src/app.ts, backend/src/routes/webhook.routes.ts).
    - Add a small provider layer for outbound messaging:
      - `WhatsAppProvider` interface: `sendMessage()` + `testConnection()`.
      - `MetaWhatsAppProvider` implements current Graph API logic.
      - `GreenApiWhatsAppProvider` implements Green-API HTTP API.
      - A factory (or resolver) selects the provider based on `config.whatsapp.provider`.
    - Add a new router for Green-API inbound webhooks under a distinct path (e.g. `/api/greenapi/webhook`) that:
      - Enforces token-based `Authorization` checks (if configured).
      - Parses `incomingMessageReceived` text messages and maps them into the existing `WhatsAppService.handleIncomingMessage` input shape.

  affected_areas:
    - backend/src/config/index.ts
    - backend/src/services/whatsapp.service.ts
    - backend/src/routes/ai-settings.routes.ts
    - backend/src/app.ts
    - backend/src/routes (new Green-API webhook router)
    - backend/src/tests/unit
    - WEBHOOK_CONFIGURATION.md

  component_details:
    - component: config.whatsapp.provider + config.greenapi
      responsibility: |
        Provide env-backed provider selection and configuration.
        Enforce production guard: in production, `WHATSAPP_PROVIDER` must be `meta` (any other value throws on startup).
      interfaces:
        - "config.whatsapp.provider: 'meta' | 'greenapi' (default: meta)"
        - "config.greenapi: { apiUrl, idInstance, apiTokenInstance, webhookUrlToken }"

    - component: WhatsAppProvider
      responsibility: |
        Define the minimum outbound contract shared across providers.
      interfaces:
        - "sendMessage(to: string, text: string, companyConfig: CompanyWhatsAppConfig): Promise<boolean>"
        - "testConnection(companyConfig: CompanyWhatsAppConfig): Promise<{ success: boolean; error?: string }>"

    - component: MetaWhatsAppProvider
      responsibility: |
        Preserve current behavior of `WhatsAppService.sendMessage()` and `WhatsAppService.testConnection()` using Meta Graph API.
      interfaces:
        - "Implements WhatsAppProvider"

    - component: GreenApiWhatsAppProvider
      responsibility: |
        Provide non-production outbound messaging using Green-API.
        - `sendMessage`: POST `{{apiUrl}}/waInstance{{idInstance}}/sendMessage/{{apiTokenInstance}}` with `{ chatId, message }` (https://green-api.com/en/docs/api/sending/SendMessage/).
        - `testConnection`: check instance authorization via GetStateInstance (https://green-api.com/en/docs/api/account/GetStateInstance/) and optionally socket status via GetStatusInstance (https://green-api.com/en/docs/api/account/GetStatusInstance/).
      interfaces:
        - "Implements WhatsAppProvider"

    - component: GreenApiWebhookRouter
      responsibility: |
        Accept inbound Green-API webhooks and adapt them into the existing inbound processing pipeline.
        Validate `Authorization` header if `GREENAPI_WEBHOOK_URL_TOKEN` configured (https://green-api.com/en/docs/api/receiving/technology-webhook-endpoint/).
        Parse `incomingMessageReceived` + `textMessage` payloads (https://green-api.com/en/docs/api/receiving/notifications-format/incoming-message/TextMessage/).
      interfaces:
        - "POST /api/greenapi/webhook"

  dependencies:
    - component: WhatsAppService
      relationship: "Calls provider factory for outbound sends and connection checks; inbound processing remains in WhatsAppService.handleIncomingMessage"
    - component: webhook.routes.ts (Meta)
      relationship: "Must remain unchanged; continues calling WhatsAppService.handleIncomingMessage"

  integration_points:
    - "Express wiring in backend/src/app.ts (mount Green-API webhook route without changing Meta webhook ordering)."
    - "Outbound messaging in backend/src/services/whatsapp.service.ts (delegate send/test to selected provider)."
    - "Admin test endpoint in backend/src/routes/ai-settings.routes.ts (optional provider-aware behavior in Green-API mode)."
    - "Unit tests under backend/src/tests/unit using Jest module isolation patterns."

