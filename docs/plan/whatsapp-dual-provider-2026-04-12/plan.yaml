    task_id: wa03_provider_greenapi
    title: Add Green-API provider (non-production only)
    description: |
      Implement `GreenApiWhatsAppProvider` with the same outbound interface:
      - `sendMessage`:
        - Build `chatId` in WhatsApp format. For phone numbers, convert `+<digits>` or `<digits>` into `<digits>@c.us`.
        - Call Green-API send endpoint:
          - POST `{{apiUrl}}/waInstance{{idInstance}}/sendMessage/{{apiTokenInstance}}`
          - Body: `{ "chatId": "...@c.us", "message": "..." }`
          - Response: `{ "idMessage": "..." }`
          (Source: https://green-api.com/en/docs/api/sending/SendMessage/)
      - `testConnection`:
        - Call GetStateInstance to verify authorization state (`authorized` vs `notAuthorized`/`blocked`/etc.) (https://green-api.com/en/docs/api/account/GetStateInstance/).
        - Optionally call GetStatusInstance for `online|offline`, but treat it as secondary because the docs warn it may return an invalid response (https://green-api.com/en/docs/api/account/GetStatusInstance/).

      Wire provider into the factory/resolver behind `config.whatsapp.provider === 'greenapi'`.

      Verification:
