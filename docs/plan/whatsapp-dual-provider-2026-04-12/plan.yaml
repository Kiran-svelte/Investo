plan_id: whatsapp-dual-provider-2026-04-12
objective: |
  Dual-track WhatsApp providers: allow Green-API only in dev/testing while enforcing Meta in production.
  Preserve existing Meta webhook security + `/api/webhook` mount order.
  Introduce provider abstraction for outbound `sendMessage` + `testConnection`, add tests, and update docs.
created_at: "2026-04-12T00:00:00Z"
created_by: GitHub Copilot (GPT-5.2)
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 12
  risk_score: medium

tldr: |
  Sources:
  - Current backend Meta-only behavior and webhook ordering/security: backend/src/app.ts, backend/src/routes/webhook.routes.ts, backend/src/config/index.ts
  - Meta webhook tests/mocking patterns: backend/src/tests/unit/webhook.routes.security.test.ts, backend/src/tests/unit/config.test.ts
  - PRD production provider expectation (WhatsApp Cloud API): prd.md
  - Green-API official docs:
    - Send text: https://green-api.com/en/docs/api/sending/SendMessage/
    - Get instance state: https://green-api.com/en/docs/api/account/GetStateInstance/
    - Get instance connection status (socket): https://green-api.com/en/docs/api/account/GetStatusInstance/
    - Incoming message envelope: https://green-api.com/en/docs/api/receiving/notifications-format/incoming-message/Webhook-IncomingMessageReceived/
    - Incoming text message payload: https://green-api.com/en/docs/api/receiving/notifications-format/incoming-message/TextMessage/
    - Webhook endpoint auth header behavior (`webhookUrlToken` → `Authorization`): https://green-api.com/en/docs/api/receiving/technology-webhook-endpoint/

  Plan outcome:
  - Add `WHATSAPP_PROVIDER` with strict production guard: when `NODE_ENV=production`, any value other than `meta` MUST crash startup (fail-fast).
  - Allow `WHATSAPP_PROVIDER=greenapi` only in non-production to use Green-API for outbound `sendMessage` + `testConnection`.
  - Preserve `/api/webhook` behavior/mount order and its HMAC raw-body signature verification + IP allowlist.
  - Add separate Green-API webhook endpoint (non-production only) with token-based `Authorization` verification and minimal parsing for incoming text messages.
  - Add Jest/Supertest tests: provider gating, Green-API webhook auth/parsing, and Meta regression coverage.
  - Update WEBHOOK_CONFIGURATION.md to document provider selection and Green-API setup.

decisions:
  production_enforcement:
    - "Fail fast: enforce provider gating during config module load so app boot fails when misconfigured (backend/src/app.ts imports backend/src/config/index.ts)."
    - "Production allowed providers: meta only (prd.md expects WhatsApp Cloud API for inbound/outbound messaging and webhook verification)."
    - "No production fallback: do not auto-switch providers at runtime; misconfiguration must be noisy and immediate."

  non_prod_enabling:
    - "Non-production (NODE_ENV != production): allow WHATSAPP_PROVIDER=greenapi; default remains meta when unset."
    - "Green-API webhook route is mounted only when provider=greenapi AND non-production (reduces attack surface vs always-mount)."

  webhook_invariants:
    - "Keep Meta webhook mounted at /api/webhook before global JSON parsing to preserve raw-body signature verification (backend/src/app.ts, backend/src/routes/webhook.routes.ts)."
    - "Do not change Meta IP allowlist behavior; it remains Meta-specific (backend/src/middleware/whatsappSecurity.ts)."

  ai_settings_test_endpoint:
    - "Make /api/ai-settings/whatsapp/test provider-aware: meta mode keeps requiring phone_number_id/access_token (backend/src/routes/ai-settings.routes.ts); greenapi mode tests the Green-API instance configured via env (backend/src/config/index.ts)."

  greenapi_webhook_security:
    - "MVP webhook hardening relies on Authorization token validation (if configured) and non-production-only mounting; do not add Green-API IP allowlisting in this scope."

  scope_limits:
    - "Provider abstraction only covers outbound text send (WhatsAppService.sendMessage) and connectivity check (WhatsAppService.testConnection) as currently implemented (backend/src/services/whatsapp.service.ts)."
    - "Rich media methods remain Meta-only and are out-of-scope for Green-API (backend/src/services/whatsapp.service.ts)."
    - "Green-API inbound support is MVP: accept only incoming text messages; ignore other webhook types."

