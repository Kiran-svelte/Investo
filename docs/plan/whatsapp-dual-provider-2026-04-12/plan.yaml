  - id: wa05_greenapi_webhook_route
    task_id: wa05_greenapi_webhook_route
    title: Add Green-API webhook endpoint with auth + text parsing
    description: |
      Add a new Express router for Green-API inbound webhooks (separate from Meta `/api/webhook`):
      - Path: `/api/greenapi/webhook` (or similar; must not replace `/api/webhook`).
      - Mount it without changing the existing `/api/webhook` ordering/security invariants (backend/src/app.ts).
      - Mount only when `WHATSAPP_PROVIDER=greenapi` AND `NODE_ENV != production`.
      - Authentication:
        - If `GREENAPI_WEBHOOK_URL_TOKEN` is configured, require incoming `Authorization` header.
        - Support the documented behavior:
          - When `webhookUrlToken` is set, Green-API sends an `Authorization` header (https://green-api.com/en/docs/api/receiving/technology-webhook-endpoint/).
          - Header can be `Basic <token>`, `Bearer <token>`, or default Bearer.
        - Reject invalid/missing auth with 403 and a non-sensitive reason.
      - Parsing:
        - Accept only `typeWebhook = incomingMessageReceived` and `messageData.typeMessage = textMessage` for MVP.
        - Extract text from `messageData.textMessageData.textMessage` (https://green-api.com/en/docs/api/receiving/notifications-format/incoming-message/TextMessage/).
        - Map sender into existing inbound DTO (backend/src/services/whatsapp.service.ts `IncomingMessage`):
          - `messageId`: `idMessage`
          - `phoneNumberId`: derive from `instanceData.wid` or `instanceData.idInstance` (document mapping expectation)
          - `customerPhone`: normalize `senderData.sender` (strip `@c.us`, keep digits)
          - `customerName`: `senderData.senderName` or `senderData.chatName` fallback
      - Response behavior:
        - Respond 200 quickly (within seconds) then process asynchronously, matching the Meta webhook pattern (backend/src/routes/webhook.routes.ts).

      Verification:
      - Add unit tests for auth + parsing (Supertest).
