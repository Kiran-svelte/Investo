plan_id: whatsapp-dual-provider-2026-04-12
objective: Summarize gem-debugger output for GreenAPI inbound webhook critical issues (tenant routing, dedup namespacing, auth normalization, logging) and map to exact repo files/tests.
focus_area: backend_greenapi_webhook_critical_issues
created_at: "2026-04-12"
created_by: GitHub Copilot (GPT-5.2)
status: completed

tldr: |
  - Root cause (per gem-debugger): GreenAPI inbound forces a sentinel `phoneNumberId` and `WhatsAppService.getCompanyByPhoneNumberId()` can fall back to `companies[0]` when an env access token is present, making tenant selection nondeterministic and unsafe in multi-tenant DBs.
  - Root cause (per gem-debugger): Deduplication keys are global by raw `messageId` (`whatsapp:msg:${messageId}`), so collisions across provider/instance (or replay) can suppress legitimate processing.
  - Root cause (per gem-debugger): GreenAPI auth normalizes only the provided Authorization header but compares against a non-normalized configured expected token, causing false 401 for expected values containing scheme/whitespace.
  - Root cause (per gem-debugger): Logs contain unmasked phone numbers (GreenAPI processing summary outcomes + WhatsAppService inbound logs).
  - Files/tests implicated are all in backend route/service layer + existing Jest/Supertest unit tests; no frontend impact identified in the debugger output.

