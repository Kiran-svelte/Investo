  methodology: "Primary source: VS Code chat-session gem-debugger resource JSON. Verification: targeted read_file of referenced backend routes/services/tests + grep_search relationship discovery + PowerShell Select-String anchors for file:line locations. Stack versions taken from backend/package.json."
  scope: "GreenAPI inbound route + WhatsAppService tenant resolution + deduplication keying + Meta webhook dedup call site + unit tests mentioned by the debugger output."
  confidence: medium
  coverage: 90
  decision_blockers: 2
  research_blockers: 1

requested_summary:
  root_cause_statements:
    - statement: "Cross-tenant leakage risk: GreenAPI inbound discards instance identity by hardcoding `phoneNumberId` (sentinel), and tenant lookup can select an arbitrary active company via a `companies[0]` fallback when `WHATSAPP_ACCESS_TOKEN` is set."
      source: "gem-debugger content.json (extra.root_cause.description)"
    - statement: "Dedup collisions: dedup keys are global and only include raw `messageId`, so duplicates can collide across provider/instance (or malicious replay), suppressing valid processing."
      source: "gem-debugger content.json (extra.root_cause.description)"
    - statement: "Auth normalization mismatch: only the provided Authorization value is normalized; expected configured token is not normalized, so `Bearer ...` / whitespace in expected config yields false 401."
      source: "gem-debugger content.json (extra.root_cause.description)"
    - statement: "PII in logs: unmasked phone numbers are logged in WhatsAppService and GreenAPI webhook summary logging."
      source: "gem-debugger content.json (extra.root_cause.description)"

  minimal_safe_fix_recommendations_from_debugger:
    tenant_routing:
      - "Fail-closed deterministic instance→tenant resolution: derive instance identifier from payload (prefer `notification.instanceData.idInstance`), then map to exactly one company; 0 matches → 404/422; >1 matches → 409; do not process in ambiguous cases; validate before returning 200 ack."
      - "Tighten `getCompanyByPhoneNumberId()` fallbacks: remove or strictly gate `companies[0]` fallback; add deterministic ordering if any fallback remains; ensure GreenAPI-specific selection cannot be bypassed by earlier fallbacks."
    dedup_namespacing:
      - "Namespace dedup keys by provider + instance (e.g., `meta:<phoneNumberId>:<messageId>` and `greenapi:<idInstance>:<messageId>`) by passing a namespaced key string into existing `claimMessageProcessing()` / `release()` call sites (no service API change required)."
    auth_normalization:
      - "Normalize both provided and expected Authorization tokens using the same logic (trim; strip Bearer/Basic prefix; compare normalized values using timing-safe compare)."
    logging:
      - "Mask phone numbers in logs (e.g., `+91******1234`), avoid logging per-message `from` values inside webhook summaries; prefer aggregates. Optionally centralize redaction in logger config."
    source: "gem-debugger content.json (extra.fix_recommendations)"

  exact_files_to_change_from_debugger:
    tenant_routing:
      - backend/src/routes/greenapi-webhook.routes.ts
      - backend/src/services/whatsapp.service.ts
    dedup_namespacing:
      - backend/src/routes/greenapi-webhook.routes.ts
      - backend/src/routes/webhook.routes.ts
      - backend/src/services/deduplication.service.ts # optional per debugger
    auth_normalization:
      - backend/src/routes/greenapi-webhook.routes.ts
    logging:
      - backend/src/services/whatsapp.service.ts
      - backend/src/routes/greenapi-webhook.routes.ts
      - backend/src/config/logger.ts # optional per debugger
    mounting_context:
      - backend/src/app.ts
    source: "gem-debugger content.json (extra.root_cause.location + extra.fix_recommendations[].location)"

  tests_to_add_or_update_from_debugger:
    - backend/src/tests/unit/greenapi-webhook.routes.test.ts
    - backend/src/tests/unit/webhook.routes.reliability.test.ts
    - backend/src/tests/unit/whatsapp.greenapi-company-resolution.test.ts
    source: "gem-debugger content.json (extra.prevention.suggested_tests)"

