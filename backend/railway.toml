[build]
builder = "nixpacks"
buildCommand = "npm ci && node node_modules/prisma/build/index.js generate && node node_modules/typescript/bin/tsc"
watchPatterns = ["src/**", "prisma/**", "package.json"]

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Required env vars (set in Railway dashboard):
# - DATABASE_URL, JWT_SECRET, JWT_REFRESH_SECRET
# - AWS_REGION (default: eu-north-1), AWS_S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# - RESEND_API_KEY, MAIL_FROM (verified sender/domain in Resend)
# - STORAGE_PROVIDER=aws (optional; defaults to aws)
