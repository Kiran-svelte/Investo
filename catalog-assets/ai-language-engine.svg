  <!-- Bottom stats bar -->
  <rect x="50" y="455" width="700" height="35" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="150" y="477" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="Segoe UI">11+ Languages</text>
  <text x="320" y="477" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="Segoe UI">&lt;10s Response</text>
  <text x="490" y="477" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold" font-family="Segoe UI">95% Population Reach</text>
  <text x="660" y="477" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="bold" font-family="Segoe UI">24/7 Active</text>
</svg>