<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="800" y2="500">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)" rx="16"/>
  
  <text x="400" y="42" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" font-family="Segoe UI">🔒 Enterprise Security &amp; Trust</text>
  <text x="400" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI">Bank-grade Security for Your Customer Data</text>
  
  <!-- Security Features Grid -->
  <!-- Row 1 -->
  <rect x="50" y="90" width="220" height="120" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="120" text-anchor="middle" fill="#3b82f6" font-size="28">🔐</text>
  <text x="160" y="148" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="Segoe UI">JWT Authentication</text>
  <text x="160" y="168" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">24h access + 7d refresh tokens</text>
  <text x="160" y="183" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">Auto-rotation on refresh</text>
  <text x="160" y="198" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Segoe UI">✓ bcrypt 12+ rounds</text>
  
  <rect x="290" y="90" width="220" height="120" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="400" y="120" text-anchor="middle" fill="#a855f7" font-size="28">🛡️</text>
  <text x="400" y="148" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="Segoe UI">RBAC (5 Roles)</text>
  <text x="400" y="168" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">Super Admin → Company Admin</text>
  <text x="400" y="183" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">Sales Agent → Operations → Viewer</text>
  <text x="400" y="198" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Segoe UI">✓ API-level enforcement</text>
  
  <rect x="530" y="90" width="220" height="120" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="120" text-anchor="middle" fill="#22c55e" font-size="28">🏢</text>
  <text x="640" y="148" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="Segoe UI">Tenant Isolation</text>
  <text x="640" y="168" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">company_id on every table</text>
  <text x="640" y="183" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">Middleware auto-injection</text>
  <text x="640" y="198" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Segoe UI">✓ Zero cross-tenant leaks</text>
  
  <!-- Row 2 -->
  <rect x="50" y="225" width="220" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="160" y="255" text-anchor="middle" fill="#f59e0b" font-size="28">📊</text>
  <text x="160" y="283" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="Segoe UI">Audit Logging</text>
  <text x="160" y="303" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">Every write operation tracked</text>
  <text x="160" y="318" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">User, action, IP, timestamp</text>
  <text x="160" y="333" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Segoe UI">✓ Full compliance trail</text>
  
  <rect x="290" y="225" width="220" height="120" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="255" text-anchor="middle" fill="#ef4444" font-size="28">🚦</text>
  <text x="400" y="283" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="Segoe UI">Rate Limiting</text>
  <text x="400" y="303" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">100 req/min per user</text>
  <text x="400" y="318" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">1000 req/min per company</text>
  <text x="400" y="333" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Segoe UI">✓ DDoS protection</text>
  
  <rect x="530" y="225" width="220" height="120" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="640" y="255" text-anchor="middle" fill="#06b6d4" font-size="28">🔍</text>
  <text x="640" y="283" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold" font-family="Segoe UI">Input Validation</text>
  <text x="640" y="303" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">Zod schema validation</text>
  <text x="640" y="318" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI">SQL injection prevention</text>
  <text x="640" y="333" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Segoe UI">✓ XSS protection</text>
  
  <!-- Bottom compliance bar -->
  <rect x="50" y="370" width="700" height="110" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold" font-family="Segoe UI">🏛️ Compliance &amp; Data Protection</text>
  
  <text x="160" y="430" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="Segoe UI">✅ GDPR Ready</text>
  <text x="160" y="448" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI">Data export &amp; deletion</text>
  
  <text x="320" y="430" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="Segoe UI">✅ Indian IT Act</text>
  <text x="320" y="448" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI">Data residency compliance</text>
  
  <text x="480" y="430" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="Segoe UI">✅ TLS Encryption</text>
  <text x="480" y="448" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI">Data in transit &amp; at rest</text>
  
  <text x="640" y="430" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="Segoe UI">✅ 90-Day Retention</text>
  <text x="640" y="448" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI">Post-deactivation policy</text>
</svg>