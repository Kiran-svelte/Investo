name: security-scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Backend npm audit (critical only)
        working-directory: backend
        run: |
          npm ci
          npm audit --audit-level=critical
      - name: Frontend npm audit (critical only)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=critical
      - name: Security unit tests
        working-directory: backend
        run: npx jest src/tests/unit/piiEncryption.service.test.ts src/tests/unit/secrets.service.test.ts src/tests/unit/securityHeaders.test.ts --runInBand --no-cache
